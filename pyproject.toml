[project]
name = "bat-analyzer"
version = "0.1.0"
description = "Static PE binary analyzer with behavioral rules, capa, YARA, and decompiler integration"
requires-python = ">=3.10"
dependencies = [
    "pefile",
]

[project.optional-dependencies]
capa = ["flare-capa"]
yara = ["yara-python"]
decompile = ["r2pipe"]
all = ["flare-capa", "yara-python", "r2pipe"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
bat-analyzer = "bat_analyzer.__main__:main"
